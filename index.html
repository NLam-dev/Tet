<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Trắc Nghiệm</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2, h3 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .question { background: #f9f9f9; padding: 15px; margin-bottom: 15px; border-left: 4px solid #3498db; border-radius: 4px; }
        button { background: #3498db; color: #fff; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background: #2980b9; }
        .result-box { display: none; margin-top: 20px; padding: 20px; border-radius: 8px; text-align: center; font-size: 18px; font-weight: bold; }
        .pass { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .fail { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">BÀI KIỂM TRA NĂNG LỰC</h2>
    
    <div id="quizForm">
        <h3>Phần 1: Thông tin học viên</h3>
        <div class="form-group">
            <input type="text" id="fullname" placeholder="Họ và tên" required>
        </div>
        <div class="form-group">
            <input type="text" id="student_id" placeholder="Mã nhân viên / Học viên" required>
        </div>

        <h3>Phần 2: Trắc nghiệm</h3>
        <div class="question">
            <p><strong>Câu 1:</strong> Thủ đô của Việt Nam là gì?</p>
            <label><input type="radio" name="q1" value="A"> A. Hà Nội</label><br>
            <label><input type="radio" name="q1" value="B"> B. TP. Hồ Chí Minh</label><br>
            <label><input type="radio" name="q1" value="C"> C. Đà Nẵng</label>
        </div>

        <div class="question">
            <p><strong>Câu 2:</strong> 5 + 5 bằng mấy?</p>
            <label><input type="radio" name="q2" value="A"> A. 9</label><br>
            <label><input type="radio" name="q2" value="B"> B. 10</label><br>
            <label><input type="radio" name="q2" value="C"> C. 11</label>
        </div>
        <button id="submitBtn">NỘP BÀI</button>
    </div>

    <div id="resultBox" class="result-box"></div>
</div>

<script type="module">
    // 1. Nhập các module cần thiết từ Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // 2. CẤU HÌNH FIREBASE CỦA BẠN (COPY TỪ BƯỚC 1 VÀ DÁN VÀO ĐÂY)
    const firebaseConfig = {
        apiKey: "ĐIỀN_API_KEY_CỦA_BẠN_VÀO_ĐÂY",
        authDomain: "ĐIỀN_DOMAIN_VÀO_ĐÂY",
        projectId: "ĐIỀN_PROJECT_ID_VÀO_ĐÂY",
        storageBucket: "ĐIỀN_BUCKET_VÀO_ĐÂY",
        messagingSenderId: "ĐIỀN_SENDER_ID_VÀO_ĐÂY",
        appId: "ĐIỀN_APP_ID_VÀO_ĐÂY"
    };

    // Khởi tạo Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Đáp án đúng (Chỉnh sửa theo câu hỏi thực tế của bạn)
    const correctAnswers = {
        q1: "A",
        q2: "B"
        // Thêm q3: "C", q4: "A"... vào đây nếu bạn có 5 câu
    };

    const totalQuestions = Object.keys(correctAnswers).length;

    // 3. Xử lý khi bấm nút Nộp Bài
    document.getElementById('submitBtn').addEventListener('click', async () => {
        const fullname = document.getElementById('fullname').value;
        const studentId = document.getElementById('student_id').value;
        
        if(!fullname || !studentId) {
            alert("Vui lòng điền đầy đủ Họ tên và Mã học viên!");
            return;
        }

        let score = 0;
        
        // Chấm điểm
        for (let key in correctAnswers) {
            const selected = document.querySelector(`input[name="${key}"]:checked`);
            if (selected && selected.value === correctAnswers[key]) {
                score++;
            }
        }

        // Đánh giá: Đạt nếu đúng trên 50%
        const isPass = (score / totalQuestions) >= 0.5;
        const resultText = isPass ? "ĐẠT - Chúc mừng bạn!" : "KHÔNG ĐẠT - Yêu cầu làm lại!";
        const scoreText = `${score} / ${totalQuestions}`;

        // Đổi giao diện nút để báo hiệu đang lưu
        document.getElementById('submitBtn').innerText = "Đang lưu kết quả...";
        document.getElementById('submitBtn').disabled = true;

        try {
            // 4. Lưu dữ liệu lên Firestore vào collection 'bang_diem'
            await addDoc(collection(db, "bang_diem"), {
                ho_ten: fullname,
                ma_hoc_vien: studentId,
                diem_so: score,
                tong_cau: totalQuestions,
                ket_qua: isPass ? "Đạt" : "Không Đạt",
                ngay_lam_bai: serverTimestamp() // Tự động lấy giờ server
            });

            // 5. Hiển thị phần 3: Kết quả
            document.getElementById('quizForm').style.display = "none"; // Ẩn form đi
            const resultBox = document.getElementById('resultBox');
            resultBox.style.display = "block";
            resultBox.className = isPass ? "result-box pass" : "result-box fail";
            resultBox.innerHTML = `
                <p>Học viên: ${fullname} - ${studentId}</p>
                <h3>Điểm của bạn: ${scoreText}</h3>
                <h2>${resultText}</h2>
            `;
        } catch (e) {
            console.error("Lỗi khi lưu: ", e);
            alert("Có lỗi xảy ra khi lưu dữ liệu. Vui lòng kiểm tra lại kết nối!");
            document.getElementById('submitBtn').innerText = "NỘP BÀI";
            document.getElementById('submitBtn').disabled = false;
        }
    });
</script>
</body>
</html>
